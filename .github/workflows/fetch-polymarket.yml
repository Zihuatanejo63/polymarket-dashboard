name: Fetch Polymarket Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟执行一次
  workflow_dispatch:  # 允许手动触发

env:
  COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
  COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
  COS_BUCKET: ${{ secrets.COS_BUCKET }}
  COS_REGION: ${{ secrets.COS_REGION }}
  COZE_API_KEY: ${{ secrets.COZE_API_KEY }}

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug Secrets
      run: |
        echo "Checking secrets..."
        if [ -z "$COS_SECRET_ID" ]; then echo "❌ COS_SECRET_ID is not set"; exit 1; else echo "✅ COS_SECRET_ID is set"; fi
        if [ -z "$COS_SECRET_KEY" ]; then echo "❌ COS_SECRET_KEY is not set"; exit 1; else echo "✅ COS_SECRET_KEY is set"; fi
        if [ -z "$COS_BUCKET" ]; then echo "❌ COS_BUCKET is not set"; exit 1; else echo "✅ COS_BUCKET: $COS_BUCKET"; fi
        if [ -z "$COS_REGION" ]; then echo "❌ COS_REGION is not set"; exit 1; else echo "✅ COS_REGION: $COS_REGION"; fi
        if [ -z "$COZE_API_KEY" ]; then echo "⚠️ COZE_API_KEY is not set (will use simple translation)"; else echo "✅ COZE_API_KEY is set"; fi

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: |
        cd scripts && pnpm install

    - name: Run Fetch Script
      run: node scripts/fetch-polymarket.js
